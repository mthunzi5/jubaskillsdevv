{% extends "base.html" %}

{% block title %}Edit User - Juba Skills LMS{% endblock %}

{% block page_title %}Edit User{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12 col-lg-8">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ user.name or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="surname" class="form-label">Surname</label>
                            <input type="text" class="form-control" id="surname" name="surname" value="{{ user.surname or '' }}">
                        </div>
                    </div>
                    
                    {% if user.role != 'intern' %}
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ user.email or '' }}">
                    </div>
                    {% else %}
                    <div class="mb-3">
                        <label class="form-label">ID Number</label>
                        <input type="text" class="form-control" value="{{ user.id_number }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label for="intern_type" class="form-label">Intern Type</label>
                        <select class="form-select" id="intern_type" name="intern_type">
                            <option value="varsity" {% if user.intern_type == 'varsity' %}selected{% endif %}>Varsity</option>
                            <option value="tvet" {% if user.intern_type == 'tvet' %}selected{% endif %}>TVET</option>
                        </select>
                    </div>
                    {% endif %}
                    
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone</label>
                        <input type="tel" class="form-control" id="phone" name="phone" value="{{ user.phone or '' }}">
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Update User</button>
                        <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
